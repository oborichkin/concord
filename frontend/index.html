<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concord</title>
    <link rel="stylesheet" id="theme-stylesheet" href="themes/default.css">
    <script>(function(){var t=localStorage.getItem('theme')||'default';var v=['default','win98'];document.getElementById('theme-stylesheet').href='themes/'+(v.includes(t)?t:'default')+'.css';})();</script>
</head>
<body>
    <h1>Concord</h1>
    <label>Theme
        <select id="theme-selector">
            <option value="default">Default</option>
            <option value="win98">Windows 98</option>
        </select>
    </label>

    <section id="videos"></section>
    <section id="peers">
        <template id="self-template">
            <article class="self">
                <span class="peer-emoji"></span>
                <h2 class="peer-name"></h2>
                <button class="mute-btn" type="button">Mute</button>
                <button class="camera-btn" type="button">Camera</button>
            </article>
        </template>
        <template id="peer-template">
            <article>
                <span class="peer-emoji"></span>
                <h2 class="peer-name"></h2>
                <audio autoplay></audio>
                <button class="mute-btn" type="button">Mute</button>
                <input type="range" class="volume" min="0" max="1" step="0.1" value="1">
            </article>
        </template>
    </section>

    <script src="emojis.js"></script>
    <script src="client.js"></script>
</body>
</html>
