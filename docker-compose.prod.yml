services:

  caddy:
    image: caddy:alpine
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./frontend:/srv
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-:80}
    depends_on:
      - signaling-server
    restart: unless-stopped

  signaling-server:
    build:
      context: ./signaling
      dockerfile: Dockerfile
    expose:
      - "8080"
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
