services:

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - signaling-server
    restart: unless-stopped

  signaling-server:
    build:
      context: ./signaling
      dockerfile: Dockerfile.dev
    ports:
      - "3001:8080"
    volumes:
      - ./signaling:/app
      - /app/node_modules
    restart: unless-stopped
